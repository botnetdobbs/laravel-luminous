name: build

on:
    push:
        branches: [ main ]
    pull_request:
        branches: [ main ]

permissions:
    contents: read

jobs:
    build:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                php: [8.4, 8.3, 8.2]
                # Laravel 11 stays supported in composer.json but is not tested
                # here: its only resolvable releases are blocked by Composer's
                # security-advisory policy, so the install step cannot pass.
                laravel: ["^13.0", "^12.0"]
                dependency-version: [prefer-lowest, prefer-stable]
                exclude:
                    - php: 8.2
                      laravel: "^13.0"
                include:
                    - laravel: "^13.0"
                      testbench: "^11.0"
                    - laravel: "^12.0"
                      testbench: "^10.0"
        name: P${{ matrix.php }} - L${{ matrix.laravel }} - ${{ matrix.dependency-version }}

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: ${{ matrix.php }}
                  extensions: curl, openssl, json, mbstring, fileinfo
                  coverage: none

            - name: Install dependencies
              run: |
                  composer require "laravel/framework:${{ matrix.laravel }}" "orchestra/testbench:${{ matrix.testbench }}" --dev --no-interaction --no-update
                  composer update --${{ matrix.dependency-version }} --prefer-dist --no-interaction

            - name: Execute tests
              run: composer test

    quality:
        runs-on: ubuntu-latest
        name: Quality (pint + phpstan)
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.3'
                  extensions: curl, openssl, json, mbstring, fileinfo
                  coverage: none

            - name: Install dependencies
              run: |
                  composer require "laravel/framework:^12.0" "orchestra/testbench:^10.0" --dev --no-interaction --no-update
                  composer update --prefer-stable --prefer-dist --no-interaction

            - name: Pint
              run: composer lint

            - name: PHPStan
              run: composer analyse
